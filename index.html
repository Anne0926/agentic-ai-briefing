<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Intelligence | Daily Briefing Hub</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--card:#1c2128;--border:#30363d;--accent:#58a6ff;--green:#3fb950;--text:#e6edf3;--text2:#8b949e;--muted:#656d76;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.hub{text-align:center;padding:40px 20px;}
.logo{font-size:2rem;margin-bottom:8px;}
h1{font-size:1.6rem;margin-bottom:4px;}
.date{color:var(--text2);margin-bottom:32px;font-size:0.95rem;}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:280px;text-decoration:none;color:var(--text);transition:all 0.2s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card-icon{font-size:2.4rem;margin-bottom:12px;}
.card h2{font-size:1.15rem;margin-bottom:8px;}
.card p{font-size:0.85rem;color:var(--text2);line-height:1.5;}
.card .count{margin-top:12px;font-size:0.8rem;color:var(--accent);font-weight:600;}
.card.green:hover{border-color:var(--green);}
.card.green .count{color:var(--green);}
footer{margin-top:40px;font-size:0.78rem;color:var(--muted);}
</style>
</head>
<body>
<div class="hub">
<div class="logo">🤖</div>
<h1>SK Intelligence | Daily Briefing</h1>
<p class="date">2026.04.06 (월) 업데이트</p>
<div class="cards">
<a href="consulting.html" class="card">
<div class="card-icon">📊</div>
<h2>Consulting Briefing</h2>
<p>글로벌 컨설팅 펌 최신 인사이트<br>전략기획 C-Suite 관점</p>
<div class="count">5건 — AI DC · 반도체 · AI · 신기술</div>
</a>
<a href="news.html" class="card green">
<div class="card-icon">📰</div>
<h2>News Scrap</h2>
<p>글로벌·국내 기술 뉴스 스크랩<br>핵심 시사점 중심</p>
<div class="count">6건 — 냉각 · HBF · 에이전트 · 핵융합</div>
</a>
</div>
<footer>
<p>© 2026 SK Intelligence | Auto-generated by AI Agent</p>
</footer>
</div>
</body>
</html>
